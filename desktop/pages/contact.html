<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="page" id="contact">
        <div class="section" id="contact-card">
            <div class="box colorOne" id="contact-card-box">
                <dialog class="box colorThree" id="contactDialog">
                    <span class="subheader text">Email Copied!</span>
                </dialog>
                <span class="text subheader underline bold">Contact Me Here</span>
                <div class="textbox contact-card" style="padding: 20px;">
                    <div class="itemsContainer contact-card" id="contact-items">
                        <!-- Items will be populated by JavaScript -->
                        </div>
                </div>                    
            </div>
        </div>
        <div class="section" id="contact-card">
            <div class="box colorTwo" id="contact-card-box">
                <span class="text subheader underline bold">See More of Me Here</span>
                <div class="textbox contact-card" style="padding: 20px;">
                    <div class="itemsContainer contact-card" id="social-items">
                        <!-- Items will be populated by JavaScript -->
                    </div>
                </div>                    
            </div>
        </div>
        <div class="section resume">
            <div class="box colorThree">
                <span class="text subheader underline bold">My Resume</span>
                <!-- inline preview -->
                <meta http-equiv="Permissions-Policy" content="fullscreen=(self)">
                <iframe src="/assets/resume.pdf" width="100%" height="600px" type="application/pdf"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
